<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiket Habis - Kajian Offline MMS</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 380px;
            width: 90%;
            border-top: 20px solid #580a55;

        }

        .icon {
            font-size: 70px;
            margin-bottom: 20px;
        }

        .status-badge {
            display: inline-block;
            background-color: #e99ae5;
            color: #580740;
            padding: 5px 15px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        h2 {
            color: #2c3e50;
            margin: 0 0 15px 0;
            font-size: 26px;
        }

        p {
            color: #0d0d0e;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn-home {
            display: inline-block;
            background-color: #040b11;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: 0.3s;
        }

        .btn-home:hover {
            background-color: #070c11;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="icon">🙏</div>
        <div class="status-badge">Sudah habis</div>
        <h2>Afwan Akhawat</h2>
        <p>Terima kasih atas antusiasme antunna! Sayangnya, kuota pendaftaran sudah <b>terpenuhi (70/70)</b>.</p>

        <a href="/" class="btn-home">Kembali ke Beranda</a>
    </div>

</body>

</html>
