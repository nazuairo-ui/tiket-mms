<!DOCTYPE html>
<html>

<head>
    <title>Pendaftaran Berhasil</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex justify-content-center align-items-center vh-100" style="background-color: #4e1745; margin: 0;">

    <div class="container">
        <div class="card shadow p-4 mx-auto text-center" style="max-width: 450px; border-radius: 20px;">

            <h3 class="text-primary fw-bold">Alhamdulillah Berhasil! 🫶</h3>
            <p>Ahlan <strong>{{ nama }}</strong>, ini tiket anti:</p>

            <div class="my-4">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data={{ kode }}" alt="QR Code Tiket"
                    class="img-fluid border p-2 bg-white shadow-sm" style="border-radius: 10px;">
            </div>

            <div class="bg-light p-3 rounded">
                <small class="text-muted">Kode Unik:</small>
                <h3 class="fw-bold" style="color: #000000;">{{ kode }}</h3>
            </div>

            <p2 class="mt-2 text">Silakan <b>screenshot</b> halaman ini dan tunjukkan ke panitia saat masuk.
            </p2>
            <p class="mt-2 text"> <b>WAJIB MENGISI FORM DATA DIRI DIBAWAH INI</b></p>
            <a href="/form  " class="btn btn-secondary btn-sm mt-3">Isi Data Diri</a>
            <hr>
            <a href="/daftar" class="btn btn-outline-primary btn-sm mt-1">Daftar Lagi</a>
        </div>
    </div>

</body>

</html>
