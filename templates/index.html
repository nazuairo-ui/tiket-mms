<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Tiket Online</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            background-color: #580740;
            color: white;
        }

        .card {
            background-color: #ffffff;
            border: none;
            border-radius: 20px;
        }

        #reader {
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            background: rgb(255, 255, 255);
        }

        .btn-primary {
            background-color: #e4bd12;
            border: none;
            padding: 12px;
        }
    </style>
</head>

<body>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6 text-center">
                <h3 class="mb-4"> MMS Kajian Offline 𖹭 </h3>

                <div class="card p-3 mb-4">
                    <div id="reader"></div>
                </div>

                {% if status %}
                <div
                    class="alert {% if status == 'berhasil' %}alert-success{% elif status == 'sudah dipakai' %}alert-warning{% else %}alert-danger{% endif %}">
                    <strong>{{ status.upper() }}!</strong><br>
                    Kode: {{ kode }}
                </div>
                <a href="/" class="btn btn-outline-light mb-3">Scan Lagi</a>
                {% endif %}

                <form action="/cek_manual" method="POST" class="mt-2">
                    <div class="input-group">
                        <input type="text" name="kode_input" class="form-control"
                            placeholder="Input kode secara manual...">
                        <button class="btn btn-primary" type="submit">Cek</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>

        function onScanSuccess(decodedText, decodedResult) {

            window.location.href = "/scan/" + decodedText;
        }

        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", { fps: 10, qrbox: 250 }
        );
        html5QrcodeScanner.render(onScanSuccess);
    </script>

</body>

</html>
